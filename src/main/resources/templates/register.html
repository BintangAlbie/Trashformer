<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Warga | TRASHFORMER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .auth-gradient {
            background: radial-gradient(circle at top right, #ecfdf5 0%, #f8fafc 50%, #f1f5f9 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .input-group:focus-within label {
            color: #059669;
        }
    </style>
</head>
<body class="auth-gradient min-h-screen flex flex-col items-center py-12 px-4">

    <div class="mb-10 text-center">
        <a th:href="@{/}" class="inline-flex items-center gap-3 group">
            <div class="bg-emerald-600 p-2.5 rounded-2xl shadow-lg shadow-emerald-200 group-hover:rotate-12 transition-transform">
                <i data-lucide="recycle" class="text-white w-8 h-8"></i>
            </div>
            <span class="text-3xl font-black tracking-tighter text-emerald-900">TRASHFORMER</span>
        </a>
    </div>

    <main class="w-full max-w-2xl">
        <section class="glass-effect p-8 md:p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/60">
            
            <div class="mb-10">
                <div class="flex items-center gap-2 mb-2">
                    <span class="px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-bold uppercase tracking-widest">
                        Registrasi Warga
                    </span>
                </div>
                <h1 class="text-3xl font-bold text-slate-900">Buat Akun Baru</h1>
                <p class="text-slate-500 mt-2">Silakan lengkapi data diri Anda untuk mulai menggunakan layanan kami.</p>
            </div>

            <div th:if="${errorMessage}" class="mb-8 flex items-center gap-3 p-4 rounded-2xl bg-red-50 border border-red-100 text-red-700">
                <i data-lucide="alert-circle" class="w-5 h-5 flex-none"></i>
                <p class="text-sm font-semibold" th:text="${errorMessage}"></p>
            </div>

            <form class="space-y-6" method="post" th:action="@{/register}">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Nama Lengkap -->
                    <div class="input-group">
                        <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1 transition-colors">Nama Lengkap</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <i data-lucide="user" class="w-5 h-5"></i>
                            </div>
                            <input type="text" name="nama" 
                                   class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-400"
                                   placeholder="Nama sesuai KTP" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="input-group">
                        <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1 transition-colors">Email</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <i data-lucide="mail" class="w-5 h-5"></i>
                            </div>
                            <input type="email" name="email" 
                                   class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-400"
                                   placeholder="email@anda.com" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="input-group">
                        <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1 transition-colors">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <i data-lucide="lock" class="w-5 h-5"></i>
                            </div>
                            <input type="password" name="password" minlength="8"
                                   class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-400"
                                   placeholder="Min. 8 karakter" required>
                        </div>
                    </div>

                    <!-- NIK -->
                    <div class="input-group">
                        <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1 transition-colors">NIK (Nomor Induk Kependudukan)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <i data-lucide="credit-card" class="w-5 h-5"></i>
                            </div>
                            <input type="text" name="nik" 
                                   class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-400"
                                   placeholder="16 digit angka" required>
                        </div>
                    </div>

                    <!-- Alamat (Full Width) -->
                    <div class="md:col-span-2 input-group">
                        <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1 transition-colors">Alamat Lengkap</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <i data-lucide="map-pin" class="w-5 h-5"></i>
                            </div>
                            <input type="text" name="alamat" 
                                   class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-400"
                                   placeholder="Jl. Nama Jalan No. 00" required>
                        </div>
                    </div>

                    <!-- No. HP -->
                    <div class="input-group">
                        <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1 transition-colors">Nomor HP</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                                <i data-lucide="phone" class="w-5 h-5"></i>
                            </div>
                            <input type="text" name="noHp" 
                                   class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-400"
                                   placeholder="08xxxxxxxxxx" required>
                        </div>
                    </div>

                    <!-- RT / RW Grid -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1 transition-colors">RT</label>
                            <input type="text" name="rt" 
                                   class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all"
                                   placeholder="001" required>
                        </div>
                        <div class="input-group">
                            <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1 transition-colors">RW</label>
                            <input type="text" name="rw" 
                                   class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all"
                                   placeholder="001" required>
                        </div>
                    </div>
                </div>

                <div class="pt-6 space-y-4">
                    <button type="submit" 
                            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-emerald-200 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                        Daftar Sebagai Warga
                        <i data-lucide="user-plus" class="w-5 h-5"></i>
                    </button>
                    
                    <div class="flex flex-col sm:flex-row items-center justify-center gap-2 text-sm text-slate-500">
                        <span>Sudah memiliki akun?</span>
                        <a th:href="@{/login}" class="text-emerald-600 font-bold hover:underline decoration-2 underline-offset-4">
                            Masuk di sini
                        </a>
                    </div>
                </div>
            </form>
        </section>

        <div class="mt-8 text-center">
            <a th:href="@{/}" class="text-slate-400 hover:text-emerald-600 text-sm font-medium inline-flex items-center gap-2 transition-colors group">
                <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
                Kembali ke Beranda
            </a>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
