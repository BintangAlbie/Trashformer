spring.application.name=trashformer
spring.datasource.url=jdbc:mysql://localhost:3306/trashformer
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.error.include-message=always

app.upload.dir=uploads

# Example local MySQL configuration:
# DB_URL=jdbc:mysql://localhost:3306/trashformer?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta
# DB_USERNAME=root
# DB_PASSWORD=
# DB_DRIVER=com.mysql.cj.jdbc.Driver
